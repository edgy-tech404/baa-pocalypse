<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baa-pocalypse</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
html,body { width:100%;height:100%;overflow:hidden;background:#000; }
canvas { display:block;cursor:crosshair; }
#mbtns { position:fixed;inset:0;pointer-events:none;z-index:10;display:none; }
#mbtns button {
  position:absolute; width:90px; height:90px; border-radius:50%;
  border:3px solid rgba(255,255,255,0.35); background:rgba(0,0,0,0.45);
  color:#fff; font-size:24px; line-height:1.1; pointer-events:all;
  touch-action:none; user-select:none; -webkit-tap-highlight-color:transparent;
}
#mbtn-burp  { right:120px; bottom:28px; }
#mbtn-poop  { right:18px;  bottom:28px; }
</style>
</head>
<body>
<div id="mbtns">
  <button id="mbtn-burp">💨<br><small>BURP</small></button>
  <button id="mbtn-poop">💩<br><small>POOP</small></button>
</div>
<canvas id="c"></canvas>
<script>
// ── Canvas ──
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener('resize', resize);
resize();

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = Math.min(r, w/2, h/2);
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

// ── Input ──
const keys = {};
const mouse = { x:0, y:0, left:false, right:false };
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { if(e.button===0) mouse.left=true; if(e.button===2) mouse.right=true; e.preventDefault(); });
canvas.addEventListener('mouseup',   e => { if(e.button===0) mouse.left=false; if(e.button===2) mouse.right=false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ── Touch / Mobile ──
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
const joystick = { active:false, id:-1, startX:0, startY:0, dx:0, dy:0 };
let aimTouchId = -1;

function handleTap(cx, cy) {
  if (gameState==='menu') {
    const bx=W/2-95,by=H*0.79,bw=190,bh=52;
    if(cx>bx&&cx<bx+bw&&cy>by&&cy<by+bh) startGame();
  }
  if (gameState==='gameover') {
    const bx=W/2-105,by=H*0.56,bw=210,bh=52;
    if(cx>bx&&cx<bx+bw&&cy>by&&cy<by+bh) startGame();
  }
  if (gameState==='upgrade') {
    const cw=200,ch=185,gap=22,total=cw*3+gap*2,sx=(W-total)/2,y=H*0.33;
    upgradeChoices.forEach((u,i)=>{
      const x=sx+i*(cw+gap);
      if(cx>x&&cx<x+cw&&cy>y&&cy<y+ch) applyUpgrade(u);
    });
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (!joystick.active && t.clientX < W * 0.5 && gameState==='playing') {
      joystick.active=true; joystick.id=t.identifier;
      joystick.startX=t.clientX; joystick.startY=t.clientY;
      joystick.dx=0; joystick.dy=0;
    } else if (aimTouchId===-1 && gameState==='playing') {
      aimTouchId=t.identifier;
      mouse.x=t.clientX; mouse.y=t.clientY; mouse.left=true;
    }
  }
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===joystick.id) {
      const dx=t.clientX-joystick.startX, dy=t.clientY-joystick.startY;
      const len=Math.hypot(dx,dy), maxR=60;
      joystick.dx = len>0 ? dx/len*Math.min(len/maxR,1) : 0;
      joystick.dy = len>0 ? dy/len*Math.min(len/maxR,1) : 0;
    } else if (t.identifier===aimTouchId) {
      mouse.x=t.clientX; mouse.y=t.clientY;
    }
  }
}, { passive:false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===joystick.id) {
      joystick.active=false; joystick.id=-1; joystick.dx=0; joystick.dy=0;
    } else if (t.identifier===aimTouchId) {
      aimTouchId=-1; mouse.left=false;
    }
    if (gameState!=='playing') handleTap(t.clientX, t.clientY);
  }
}, { passive:false });

if (isMobile) {
  document.getElementById('mbtns').style.display = 'block';
  document.getElementById('mbtn-burp').addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if (gameState==='playing' && player && player.burpCd===0) fireBurp();
  }, { passive:false });
  document.getElementById('mbtn-poop').addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if (gameState==='playing' && player && player.poopCd===0) dropPoop();
  }, { passive:false });
}

// ── Helpers ──
const rand  = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));
const dist  = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const ang   = (a,b) => Math.atan2(b.y-a.y, b.x-a.x);

// ── Constants ──
const PR = 22; // player radius

const ZDEFS = {
  walker: { r:16, hp:3,  spd:1.2, pts:10,  col:'#66BB6A', sz:38 },
  runner: { r:12, hp:1,  spd:3.0, pts:20,  col:'#9CCC65', sz:28 },
  brute:  { r:26, hp:12, spd:0.75,pts:50,  col:'#FF7043', sz:56 },
  boss:   { r:36, hp:50, spd:0.95,pts:250, col:'#E91E63', sz:72 },
};

// ── Upgrade pool ──
const UPGRADES = [
  { icon:'⚡', name:'Rapid Spit',     desc:'Spit fires 35% faster',     apply:p=>p.spitMaxCd=Math.max(5,Math.floor(p.spitMaxCd*0.65)) },
  { icon:'✌️', name:'Double Spit',    desc:'Fire 2 projectiles at once', apply:p=>p.spitCount=Math.min(5,p.spitCount+1) },
  { icon:'💪', name:'Power Spit',     desc:'Spit damage +1',             apply:p=>p.spitDmg++ },
  { icon:'💥', name:'Explosive Spit', desc:'Spit explodes on impact',    apply:p=>p.explosive=true },
  { icon:'🌪️', name:'Speedy Hooves',  desc:'Move speed +25%',            apply:p=>p.speed*=1.25 },
  { icon:'❤️', name:'Extra Heart',    desc:'+1 max HP, restore 1 HP',    apply:p=>{ p.maxHp++; p.hp=Math.min(p.hp+2,p.maxHp); } },
  { icon:'💨', name:'Mega Burp',      desc:'Burp radius & damage +',     apply:p=>{ p.burpR+=60; p.burpDmg++; } },
  { icon:'🌬️', name:'Quick Burp',     desc:'Burp cooldown -30%',         apply:p=>p.burpMaxCd=Math.max(60,Math.floor(p.burpMaxCd*0.7)) },
  { icon:'🥄', name:'Poop Power',     desc:'Poop damage +1',             apply:p=>p.poopDmg++ },
  { icon:'⏳', name:'Long Lasting',   desc:'Poop lasts twice as long',   apply:p=>p.poopDur*=2 },
  { icon:'🌊', name:'Stun Burp',      desc:'Burp stuns zombies longer',  apply:p=>p.burpStun+=45 },
  { icon:'🎯', name:'Fast Spit',      desc:'Spit projectile speed +30%', apply:p=>p.spitSpd*=1.3 },

// ── Audio ──
let _audioCtx = null;
function getAc() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playNote(freq, type, dur, vol, t) {
  if (!freq) return;
  const a = getAc(); const now = t !== undefined ? t : a.currentTime;
  const osc = a.createOscillator(), g = a.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(g); g.connect(a.destination);
  osc.start(now); osc.stop(now + dur + 0.01);
}

function playSheepBaa(vol = 0.13) {
  const a = getAc(), now = a.currentTime;
  const osc = a.createOscillator(), g = a.createGain();
  const vib = a.createOscillator(), vibG = a.createGain();
  vib.frequency.value = 7; vibG.gain.value = 25;
  vib.connect(vibG); vibG.connect(osc.frequency);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(380, now);
  osc.frequency.setValueAtTime(330, now + 0.1);
  osc.frequency.linearRampToValueAtTime(280, now + 0.4);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(vol, now + 0.04);
  g.gain.setValueAtTime(vol, now + 0.3);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.65);
  osc.connect(g); g.connect(a.destination);
  vib.start(now); osc.start(now); vib.stop(now + 0.7); osc.stop(now + 0.7);
}

function playZombieGrunt(vol = 0.09) {
  const a = getAc(), now = a.currentTime;
  const osc = a.createOscillator(), flt = a.createBiquadFilter(), g = a.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, now);
  osc.frequency.exponentialRampToValueAtTime(35, now + 0.35);
  flt.type = 'lowpass'; flt.frequency.value = 250;
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
  osc.connect(flt); flt.connect(g); g.connect(a.destination);
  osc.start(now); osc.stop(now + 0.45);
}

  const a = getAc(), now = a.currentTime;
  const osc = a.createOscillator(), g = a.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(700, now);
  osc.frequency.exponentialRampToValueAtTime(180, now + 0.07);

}

  lfo.connect(lfoG); lfoG.connect(osc.frequency);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(110, now);
  osc.frequency.linearRampToValueAtTime(40, now + 0.55);
  g.gain.setValueAtTime(0.22, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.68);
  osc.connect(g); g.connect(a.destination);
  lfo.start(now); osc.start(now); lfo.stop(now + 0.72); osc.stop(now + 0.72);
}

function playPoop() {
  const a = getAc(), now = a.currentTime;
  const osc = a.createOscillator(), g = a.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(55, now + 0.18);
  g.gain.setValueAtTime(0.16, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
  osc.connect(g); g.connect(a.destination);
  osc.start(now); osc.stop(now + 0.25);
}

function playExplosion() {
  const a = getAc(), now = a.currentTime;
  const len = Math.floor(a.sampleRate * 0.35);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = a.createBufferSource();
  src.buffer = buf;
  const flt = a.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 700;
  const g = a.createGain();
  g.gain.setValueAtTime(0.32, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
  src.connect(flt); flt.connect(g); g.connect(a.destination);
  src.start(now); src.stop(now + 0.4);
}

  osc.connect(g); g.connect(a.destination);
  vib.start(now); osc.start(now); vib.stop(now + 0.5); osc.stop(now + 0.5);

function playWaveStart(isBoss) {
  const a = getAc(), now = a.currentTime;
  if (isBoss) {
    [65, 55, 50, 45].forEach((f, i) => playNote(f, 'sawtooth', 0.45, 0.14, now + i * 0.3));
    setTimeout(() => playZombieGrunt(0.18), 900);
    setTimeout(() => playZombieGrunt(0.22), 1300);
  } else {
    [440, 550, 660].forEach((f, i) => playNote(f, 'square', 0.08, 0.07, now + i * 0.1));
    if (wave > 1) setTimeout(() => playSheepBaa(0.06), 380);
  }
}

function playWaveClear() {

}

// Background music
let bgMusicActive = false;
let bgAmbientTimer = null;

function startBgMusic() {
  if (bgMusicActive) return;
  bgMusicActive = true;
  loopBgMusic();
  scheduleAmbient();
}

function stopBgMusic() {
  bgMusicActive = false;
  clearTimeout(bgAmbientTimer);
}

function loopBgMusic() {
  if (!bgMusicActive) return;
  const a = getAc(), now = a.currentTime;
  const tempo = 0.48;
  const intensity = Math.min(1, wave / 8);

  // Ominous bass line (D minor root movement)
  const bassLine = [55, 55, 0, 58, 55, 0, 52, 55];
  bassLine.forEach((f, i) => {
    if (!f) return;
    const osc = a.createOscillator(), g = a.createGain(), flt = a.createBiquadFilter();
    osc.type = 'sawtooth'; osc.frequency.value = f;
    flt.type = 'lowpass'; flt.frequency.value = 200;
    const t = now + i * tempo;
    g.gain.setValueAtTime(0.07 + intensity * 0.04, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + tempo * 0.9);
    osc.connect(flt); flt.connect(g); g.connect(a.destination);
    osc.start(t); osc.stop(t + tempo);
  });

  // Eerie melody
  const melody = [0, 330, 0, 370, 349, 0, 330, 294];
  melody.forEach((f, i) => {
    if (!f) return;
    playNote(f, 'triangle', tempo * 0.7, 0.035 + intensity * 0.02, now + i * tempo);
  });

  // Kick on even beats
  [0, 2, 4, 6].forEach(i => {
    const t = now + i * tempo;
    const osc = a.createOscillator(), g = a.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90, t);
    osc.frequency.exponentialRampToValueAtTime(28, t + 0.1);
    g.gain.setValueAtTime(0.14, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
    osc.connect(g); g.connect(a.destination);
    osc.start(t); osc.stop(t + 0.2);
  });

  // Hi-hat snare on odd beats at higher waves
  if (intensity > 0.3) {
    [1, 3, 5, 7].forEach(i => {
      const t = now + i * tempo;
      const len = Math.floor(a.sampleRate * 0.06);
      const buf = a.createBuffer(1, len, a.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < len; j++) d[j] = (Math.random() * 2 - 1) * (1 - j / len);
      const src = a.createBufferSource();
      src.buffer = buf;
      const flt = a.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 3000;
      const g = a.createGain();
      g.gain.setValueAtTime(0.05 * intensity, t);
      src.connect(flt); flt.connect(g); g.connect(a.destination);
      src.start(t); src.stop(t + 0.07);
    });
  }

  const loopDur = bassLine.length * tempo;
  setTimeout(() => loopBgMusic(), (loopDur - 0.15) * 1000);
}

function scheduleAmbient() {
  if (!bgMusicActive) return;
  const baaDelay = 3500 + Math.random() * 5000;
  bgAmbientTimer = setTimeout(() => {
    if (bgMusicActive && gameState === 'playing') playSheepBaa(0.05 + Math.random() * 0.05);
    scheduleAmbient();
  }, baaDelay);
  const gruntDelay = 5000 + Math.random() * 7000;
  setTimeout(() => {
    if (bgMusicActive && gameState === 'playing') playZombieGrunt(0.04 + Math.random() * 0.04);
  }, gruntDelay);
}

// ── Game state ──
let gameState = 'menu'; // menu | playing | upgrade | gameover
let score=0, highScore=0, wave=0, kills=0;
let shakeF=0, shakeA=0;
let upgradeChoices=[], waveQueue=[], waveSpawnT=0, waveComplete=false, waveCompleteT=0;
let bannerT=0;
let comboCount=0, comboTimer=0;

// ── Objects ──
let player, zombies, spits, burps, poopMines, particles, powerups;

function mkPlayer() {
  return {
    x:W/2, y:H/2,
    hp:5, maxHp:5,
    invT:0, angle:0,
    speed:3,
    spitCd:0,  spitMaxCd:15, spitDmg:1, spitSpd:10, spitCount:1, explosive:false,
    burpCd:0,  burpMaxCd:220, burpDmg:2, burpR:110, burpStun:60,
    poopCd:0,  poopMaxCd:140, poopDmg:1, poopR:28, poopDur:360,
  };
}

// ── Wave composition ──
function waveComposition(w) {
  const q=[];
  if (w % 5 === 0) {
    q.push('boss');
    for(let i=0;i<w;i++) q.push('walker');
    for(let i=0;i<Math.floor(w*0.8);i++) q.push('runner');
  } else {
    const base = 4 + w*2;
    for(let i=0;i<base;i++) q.push('walker');
    if (w>=2) for(let i=0;i<Math.floor(w*1.5);i++) q.push('runner');
    if (w>=4) for(let i=0;i<Math.floor(w*0.5);i++) q.push('brute');
  }
  return q.sort(()=>Math.random()-0.5);
}

function startWave() {
  wave++;
  waveQueue = waveComposition(wave);
  waveSpawnT = 0; waveComplete = false; bannerT = 120;
  setTimeout(() => playWaveStart(wave % 5 === 0), 300);
}

function mkZombie(type) {
  const d = ZDEFS[type];
  const edge = randInt(0,3);
  let x,y;
  if      (edge===0) { x=rand(0,W); y=-60; }
  else if (edge===1) { x=W+60; y=rand(0,H); }
  else if (edge===2) { x=rand(0,W); y=H+60; }
  else               { x=-60;  y=rand(0,H); }
  return { type,x,y, hp:d.hp, maxHp:d.hp,
    speed: d.spd*(1+wave*0.04), r:d.r, sz:d.sz,
    pts:d.pts, col:d.col, angle:0,
    stunT:0, dmgFlash:0, dead:false };
}

// ── Attacks ──
function fireSpit() {
  playSpit();
  player.spitCd = player.spitMaxCd;
  const spread = (player.spitCount-1)*0.3;
  for(let i=0;i<player.spitCount;i++){
    const a = player.angle + (i-(player.spitCount-1)/2)*spread/(Math.max(1,player.spitCount-1)||1);
    spits.push({ x:player.x, y:player.y,
      vx:Math.cos(a)*player.spitSpd, vy:Math.sin(a)*player.spitSpd,
      r:7, dmg:player.spitDmg, explosive:player.explosive, life:130, trail:[] });
  }
}

function fireBurp() {
  playBurp();
  player.burpCd = player.burpMaxCd;
  burps.push({ x:player.x, y:player.y, r:0, maxR:player.burpR,
    dmg:player.burpDmg, stunDur:player.burpStun, life:25, hit:new Set() });
  for(let i=0;i<25;i++){
    const a=Math.random()*Math.PI*2, speed=rand(2,5);
    particles.push({ type:'gas', x:player.x, y:player.y,
      vx:Math.cos(a)*speed, vy:Math.sin(a)*speed,
      life:rand(30,50), maxLife:50, r:rand(14,28), col:'#B5D633' });
  }
}

function dropPoop() {
  playPoop();
  player.poopCd = player.poopMaxCd;
  poopMines.push({ x:player.x, y:player.y, r:player.poopR,
    dmg:player.poopDmg, dur:player.poopDur, t:0, tickT:0 });
}

// ── Damage ──
function randInt(a,b){ return Math.floor(rand(a,b+1)); }

function hitZombie(z, dmg, stun=false, stunDur=0) {
  if (z.dead) return;
  z.hp -= dmg;
  z.dmgFlash = 12;
  if (stun) z.stunT = Math.max(z.stunT, stunDur);
  if (z.hp <= 0) {
    z.dead = true;
    playZombieDeath();
    score += z.pts;
    kills++;
    comboCount++; comboTimer = 120;
    if(comboCount>=3) score += comboCount*2;
    spawnParticles(z.x, z.y, z.col, 16);
    floatText(z.x, z.y-z.r-10, '+'+z.pts, '#FFD700');
    if(Math.random()<0.12) powerups.push({ x:z.x,y:z.y, type:Math.random()<0.5?'heart':'star', r:14, life:300 });
  }
}

function explodeAt(x,y) {
  playExplosion();
  spawnParticles(x,y,'#FF8C00',20);
  shakeF=8; shakeA=5;
  burps.push({ x,y,r:0,maxR:70,dmg:1,stunDur:20,life:12,hit:new Set() });
}

// ── Particles ──
function spawnParticles(x,y,col,n=10) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=rand(1.5,5.5);
    particles.push({ type:'dot', x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:rand(22,48), maxLife:48, col, sz:rand(3,8) });
  }
}

function floatText(x,y,txt,col) {
  particles.push({ type:'txt', x,y, vy:-1.8, life:55, maxLife:55, txt, col });
}

// ── Update ──
function update() {
  if (gameState!=='playing') return;

  // Player move
  let dx=0, dy=0;
  if(keys['KeyW']||keys['ArrowUp'])    dy--;
  if(keys['KeyS']||keys['ArrowDown'])  dy++;
  if(keys['KeyA']||keys['ArrowLeft'])  dx--;
  if(keys['KeyD']||keys['ArrowRight']) dx++;
  dx += joystick.dx; dy += joystick.dy;
  if(dx||dy){ const l=Math.hypot(dx,dy); dx/=l; dy/=l; }
  const BORDER = PR + 10;
  player.x = clamp(player.x+dx*player.speed, BORDER, W-BORDER);
  player.y = clamp(player.y+dy*player.speed, BORDER, H-BORDER);
  player.angle = ang(player, mouse);

  // Cooldowns
  if(player.spitCd>0) player.spitCd--;
  if(player.burpCd>0) player.burpCd--;
  if(player.poopCd>0) player.poopCd--;
  if(player.invT>0)   player.invT--;

  // Attacks
  if((mouse.left||keys['Space']) && player.spitCd===0) fireSpit();
  if((keys['KeyQ']||keys['ShiftLeft']||keys['ShiftRight']) && player.burpCd===0) fireBurp();
  if((mouse.right||keys['KeyE']) && player.poopCd===0) dropPoop();

  // Combo decay
  if(comboTimer>0) comboTimer--;
  else comboCount=0;

  // Spawn from wave queue
  waveSpawnT++;
  const spawnRate = Math.max(35, 65 - wave*3);
  if(waveSpawnT>=spawnRate && waveQueue.length>0){
    waveSpawnT=0;
    zombies.push(mkZombie(waveQueue.shift()));
    if(wave>=3 && Math.random()<0.4) setTimeout(()=>{ if(gameState==='playing') zombies.push(mkZombie(waveQueue.shift()||'walker')); },300);
  }

  // Update zombies
  zombies.forEach(z=>{
    if(z.dead) return;
    if(z.dmgFlash>0) z.dmgFlash--;
    if(z.stunT>0){ z.stunT--; return; }
    const a = ang(z, player);
    z.x += Math.cos(a)*z.speed;
    z.y += Math.sin(a)*z.speed;
    z.angle = a;
    // Player collision
    if(player.invT===0 && dist(z,player)<z.r+PR){
      player.hp--;
      player.invT=90;
      playPlayerHit();
      shakeF=14; shakeA=9;
      // Knockback: push sheep away from zombie so it can't get pinned
      const pushA = ang(z, player);
      const BORDER = PR + 10;
      player.x = clamp(player.x + Math.cos(pushA)*28, BORDER, W-BORDER);
      player.y = clamp(player.y + Math.sin(pushA)*28, BORDER, H-BORDER);
      spawnParticles(player.x,player.y,'#FF4040',18);
      floatText(player.x,player.y-40,'OUCH!','#FF4040');
      if(player.hp<=0){ gameState='gameover'; if(score>highScore) highScore=score; stopBgMusic(); }
    }
  });

  // Spits
  spits = spits.filter(s=>{
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>7) s.trail.shift();
    s.x+=s.vx; s.y+=s.vy; s.life--;
    if(s.life<=0||s.x<-20||s.x>W+20||s.y<-20||s.y>H+20) return false;
    let hit=false;
    for(const z of zombies){
      if(!z.dead && dist(s,z)<s.r+z.r){
        hitZombie(z,s.dmg);
        if(s.explosive) explodeAt(s.x,s.y);
        hit=true; break;
      }
    }
    return !hit;
  });

  // Burp clouds
  burps = burps.filter(b=>{
    b.r = Math.min(b.maxR, b.r+b.maxR/18);
    b.life--;
    zombies.forEach(z=>{
      if(!z.dead && !b.hit.has(z) && dist(b,z)<b.r+z.r){
        b.hit.add(z);
        hitZombie(z,b.dmg,true,b.stunDur);
      }
    });
    return b.life>0;
  });

  // Poop mines
  poopMines = poopMines.filter(p=>{
    p.t++; p.tickT++;
    if(p.tickT>=25){
      p.tickT=0;
      zombies.forEach(z=>{ if(!z.dead && dist(p,z)<p.r+z.r) hitZombie(z,p.dmg); });
    }
    return p.t<p.dur;
  });

  // Particles
  particles = particles.filter(p=>{
    p.life--;
    if(p.type==='dot'){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; }
    if(p.type==='gas'){ p.x+=p.vx; p.y+=p.vy; }
    if(p.type==='txt'){ p.y+=p.vy; p.vy*=0.95; }
    return p.life>0;
  });

  // Power-ups
  powerups = powerups.filter(pw=>{
    pw.life--;
    if(dist(pw,player)<pw.r+PR){
      if(pw.type==='heart'){ player.hp=Math.min(player.hp+1,player.maxHp); floatText(player.x,player.y-40,'❤️ +1',  '#FF5555'); playHeartPickup(); }
      else                 { score+=50; floatText(player.x,player.y-40,'+50!','#FFD700'); playStarPickup(); }
      return false;
    }
    return pw.life>0;
  });

  // Cull dead zombies
  zombies = zombies.filter(z=>!z.dead);

  // Shake decay
  if(shakeF>0){ shakeF--; shakeA*=0.82; }

  // Wave banner
  if(bannerT>0) bannerT--;

  // Wave complete check
  if(!waveComplete && waveQueue.length===0 && zombies.length===0){
    waveComplete=true; waveCompleteT=0;
  }
  if(waveComplete){
    waveCompleteT++;
    if(waveCompleteT===1) playWaveClear();
    if(waveCompleteT===100){ pickUpgrades(); gameState='upgrade'; }
  }
}

// ── Pick upgrades ──
function pickUpgrades(){
  upgradeChoices = [...UPGRADES].sort(()=>Math.random()-0.5).slice(0,3);
}

function applyUpgrade(u){ UPGRADE_SOUNDS[u.name]?.(); u.apply(player); gameState='playing'; startWave(); }

// ── Draw helpers ──
function emoji(e,x,y,sz,angle=0,alpha=1){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y);
  ctx.rotate(angle);
  ctx.font=`${sz}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(e,0,0);
  ctx.restore();
}

function shadow(x,y,rx,ry){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Draw background ──
function drawBg(){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
  g.addColorStop(0,'#56A84B'); g.addColorStop(1,'#2D6B25');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=64){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=64){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  const v=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.25,W/2,H/2,Math.max(W,H)*0.85);
  v.addColorStop(0,'transparent'); v.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
}

// ── Draw poops ──
function drawPoops(){
  poopMines.forEach(p=>{
    const fade = p.t/p.dur, alpha = fade>0.75 ? 1-(fade-0.75)/0.25 : 1;
    ctx.save();
    ctx.globalAlpha=alpha*0.22;
    ctx.fillStyle='#8B4513';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r+12,0,Math.PI*2); ctx.fill();
    ctx.restore();
    emoji('💩',p.x,p.y,30,0,alpha);
  });
}

// ── Draw burps ──
function drawBurps(){
  burps.forEach(b=>{
    const a=(b.life/25)*0.45;
    ctx.save();
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    g.addColorStop(0,`rgba(180,235,50,${a})`);
    g.addColorStop(0.5,`rgba(120,200,30,${a*0.6})`);
    g.addColorStop(1,'rgba(80,160,10,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── Draw spits ──
function drawSpits(){
  spits.forEach(s=>{
    s.trail.forEach((pt,i)=>{
      const t=i/s.trail.length;
      ctx.save(); ctx.globalAlpha=t*0.55;
      ctx.fillStyle='#8FD44E';
      ctx.beginPath(); ctx.arc(pt.x,pt.y,s.r*t,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
    ctx.save();
    ctx.shadowColor='#A8E063'; ctx.shadowBlur=12;
    ctx.fillStyle='#6DBF3E';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(s.x-s.r*0.3,s.y-s.r*0.3,s.r*0.35,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── Draw zombies ──
function drawZombies(){
  // Draw boss health bar at top if boss alive
  const boss = zombies.find(z=>z.type==='boss');
  if(boss){
    const bw=W*0.5, bh=14, bx=(W-bw)/2, by=12;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.beginPath(); ctx.roundRect(bx-4,by-4,bw+8,bh+8,8); ctx.fill();
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#E91E63'; ctx.fillRect(bx,by,bw*(boss.hp/boss.maxHp),bh);
    ctx.fillStyle='#fff'; ctx.font='bold 11px "Segoe UI"'; ctx.textAlign='center';
    ctx.fillText(`👑 BOSS  ${boss.hp}/${boss.maxHp}`,W/2,by+bh+14);
    ctx.restore();
  }

  zombies.forEach(z=>{
    shadow(z.x, z.y+z.r*0.65, z.r*0.75, z.r*0.22);

    // damage flash
    if(z.dmgFlash>0){
      ctx.save(); ctx.globalAlpha=0.55;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Emoji (flip by direction)
    ctx.save();
    ctx.translate(z.x,z.y);
    if(Math.cos(z.angle)<0) ctx.scale(-1,1);
    if(z.stunT>0) ctx.globalAlpha=0.65;
    ctx.font=`${z.sz}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🧟',0,0);
    ctx.restore();

    // Health bar (only if damaged)
    if(z.hp<z.maxHp){
      const bw=z.r*2.4, bh=5, bx=z.x-bw/2, by=z.y-z.r*1.6;
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
      ctx.fillStyle=z.hp>z.maxHp*0.5?'#4CAF50':'#FF5722';
      ctx.fillRect(bx,by,bw*(z.hp/z.maxHp),bh);
    }

    // Stun stars
    if(z.stunT>0){
      for(let i=0;i<3;i++){
        const a=Date.now()*0.005+i*(Math.PI*2/3);
        emoji('⭐',z.x+Math.cos(a)*z.r*1.15,z.y-z.r*1.3+Math.sin(a)*4,13);
      }
    }
  });
}

// ── Draw player ──
function drawPlayer(){
  shadow(player.x,player.y+PR*0.7,PR*0.8,PR*0.26);
  const flashAlpha = player.invT>0 ? (Math.sin(player.invT*0.5)>0?0.45:1) : 1;
  ctx.save();
  ctx.translate(player.x,player.y);
  if(Math.cos(player.angle)<0) ctx.scale(-1,1);
  ctx.globalAlpha=flashAlpha;
  ctx.font=`${PR*2.5}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐑',0,0);
  ctx.restore();

  // Aim dot
  ctx.save();
  ctx.globalAlpha=0.4;
  ctx.fillStyle='#fff';
  const ad=PR+14;
  ctx.beginPath(); ctx.arc(player.x+Math.cos(player.angle)*ad, player.y+Math.sin(player.angle)*ad, 3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Draw particles ──
function drawParticles(){
  particles.forEach(p=>{
    const t=p.life/p.maxLife;
    ctx.save(); ctx.globalAlpha=t;
    if(p.type==='dot'){
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*t,0,Math.PI*2); ctx.fill();
    } else if(p.type==='gas'){
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1-t*0.4),0,Math.PI*2); ctx.fill();
    } else if(p.type==='txt'){
      ctx.font=`bold 16px "Segoe UI"`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=3;
      ctx.strokeText(p.txt,p.x,p.y);
      ctx.fillStyle=p.col; ctx.fillText(p.txt,p.x,p.y);
    }
    ctx.restore();
  });
}

// ── Draw power-ups ──
function drawPowerups(){
  powerups.forEach(pw=>{
    const bob=Math.sin(Date.now()*0.005)*5;
    const alpha=pw.life<60?pw.life/60:1;
    ctx.save(); ctx.globalAlpha=alpha*0.3;
    ctx.fillStyle=pw.type==='heart'?'#FF4444':'#FFD700';
    ctx.beginPath(); ctx.arc(pw.x,pw.y+bob,18,0,Math.PI*2); ctx.fill();
    ctx.restore();
    emoji(pw.type==='heart'?'❤️':'⭐',pw.x,pw.y+bob,28,0,alpha);
  });
}

// ── HUD ──
function drawCdBar(label, key, cd, maxCd, x, y, col){
  const ready=cd===0, bw=100, bh=9;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(x-bw/2-8,y-26,bw+16,44,10); ctx.fill();
  ctx.font='bold 12px "Segoe UI"'; ctx.textAlign='center';
  ctx.fillStyle=ready?'#fff':'rgba(255,255,255,0.45)';
  ctx.fillText(`${label} [${key}]`,x,y-11);
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(x-bw/2,y,bw,bh,5); ctx.fill();
  ctx.fillStyle=col;
  if(!ready){ ctx.globalAlpha=0.8; ctx.beginPath(); ctx.roundRect(x-bw/2,y,bw*(1-cd/maxCd),bh,5); ctx.fill(); }
  else { ctx.shadowColor=col; ctx.shadowBlur=10; ctx.beginPath(); ctx.roundRect(x-bw/2,y,bw,bh,5); ctx.fill(); }
  ctx.restore();
}

function drawHUD(){
  // Hearts
  for(let i=0;i<player.maxHp;i++) emoji(i<player.hp?'❤️':'🖤',22+i*32,22,26);

  // Score + wave
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=6;
  ctx.font='bold 30px "Segoe UI"';
  ctx.fillText(score,W/2,38);
  ctx.font='bold 15px "Segoe UI"';
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText(`WAVE ${wave}`,W/2,58);
  ctx.restore();

  // Combo
  if(comboCount>=3){
    ctx.save();
    ctx.textAlign='center';
    ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=14;
    ctx.font=`bold ${18+Math.min(comboCount,10)}px "Segoe UI"`;
    ctx.fillText(`🔥 x${comboCount} COMBO!`,W/2,82);
    ctx.restore();
  }

  // Remaining zombies
  const rem=zombies.length+waveQueue.length;
  if(rem>0){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(W-164,8,156,26,13); ctx.fill();
    ctx.font='13px "Segoe UI"'; ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.fillText(`🧟 ${rem} remaining`,W-86,25);
    ctx.restore();
  }

  // Cooldown bars
  const cy=H-52;
  drawCdBar('💧 SPIT','LMB/SPC', player.spitCd,player.spitMaxCd, W/2-160, cy, '#6DBF3E');
  drawCdBar('💨 BURP','Q/SHIFT',  player.burpCd,player.burpMaxCd, W/2,      cy, '#C8E050');
  drawCdBar('💩 POOP','RMB/E',    player.poopCd,player.poopMaxCd, W/2+160,  cy, '#A0721A');

  // Wave banner
  if(bannerT>0){
    const a=bannerT>80?1:bannerT/80;
    ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
    ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=20;
    ctx.font=`bold ${wave%5===0?48:38}px "Segoe UI"`;
    ctx.fillText(wave%5===0?`💀 BOSS WAVE ${wave}!`:`WAVE ${wave}`,W/2,H*0.38);
    ctx.restore();
  }

  // Wave complete
  if(waveComplete && gameState==='playing'){
    const a=waveCompleteT<20?waveCompleteT/20:1;
    ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
    ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=20;
    ctx.font='bold 44px "Segoe UI"';
    ctx.fillText(`✅ Wave ${wave} Clear!`,W/2,H/2-20);
    ctx.font='20px "Segoe UI"'; ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.shadowBlur=0;
    ctx.fillText('Preparing upgrade...',W/2,H/2+28);
    ctx.restore();
  }
}

// ── Upgrade screen ──
function drawUpgrade(){
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=22;
  ctx.font='bold 38px "Segoe UI"';
  ctx.fillText('⭐  CHOOSE AN UPGRADE  ⭐',W/2,H*0.2);
  ctx.shadowBlur=0;
  ctx.font='17px "Segoe UI"'; ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('Click a card or press 1 / 2 / 3',W/2,H*0.2+46);

  const cw=200, ch=185, gap=22;
  const total=cw*3+gap*2, sx=(W-total)/2, y=H*0.33;

  upgradeChoices.forEach((u,i)=>{
    const x=sx+i*(cw+gap);
    const hover=mouse.x>x&&mouse.x<x+cw&&mouse.y>y&&mouse.y<y+ch;
    ctx.save();
    if(hover) ctx.translate(0,-8);
    ctx.fillStyle=hover?'rgba(255,255,255,0.16)':'rgba(255,255,255,0.08)';
    ctx.strokeStyle=hover?'rgba(255,215,0,0.9)':'rgba(255,255,255,0.18)';
    ctx.lineWidth=hover?2:1;
    ctx.beginPath(); ctx.roundRect(x,y,cw,ch,18); ctx.fill(); ctx.stroke();
    // Number badge
    ctx.fillStyle='rgba(255,215,0,0.7)'; ctx.beginPath(); ctx.arc(x+20,y+20,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.font='bold 14px "Segoe UI"'; ctx.textAlign='center';
    ctx.fillText(i+1,x+20,y+24);
    // Icon
    ctx.font='46px serif'; ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillText(u.icon,x+cw/2,y+70);
    // Name
    ctx.font='bold 15px "Segoe UI"'; ctx.fillStyle='#fff'; ctx.textBaseline='alphabetic';
    ctx.fillText(u.name,x+cw/2,y+114);
    // Desc
    ctx.font='12px "Segoe UI"'; ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillText(u.desc,x+cw/2,y+136);
    if(hover){ ctx.fillStyle='rgba(255,215,0,0.9)'; ctx.font='bold 13px "Segoe UI"'; ctx.fillText('✓ Select',x+cw/2,y+162); }
    ctx.restore();
  });
}

// ── Menu ──
function drawMenu(){
  drawBg();
  ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=28;
  ctx.font='bold 64px "Segoe UI"';
  ctx.fillText('🐑  BAA-POCALYPSE',W/2,H*0.28);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='20px "Segoe UI"';
  ctx.fillText('A sheep vs zombie survival game. Unleash chaos.',W/2,H*0.28+52);

  const tips=[['WASD','Move'],['LMB / Space','Spit 💧'],['Q / Shift','Burp 💨'],['RMB / E','Poop 💩']];
  ctx.font='14px "Segoe UI"';
  const rowH=38, colW=240, startY=H*0.46;
  tips.forEach((t,i)=>{
    const col=i%2, row=Math.floor(i/2);
    const x=W/2+(col*2-1)*colW*0.55, y=startY+row*rowH;
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(x-colW/2,y-14,colW,28,8); ctx.fill();
    ctx.fillStyle='#FFD700'; ctx.textAlign='right'; ctx.fillText(t[0],x-6,y+5);
    ctx.fillStyle='#fff';    ctx.textAlign='left';  ctx.fillText(t[1],x+6,y+5);
  });

  if(highScore>0){
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,215,0,0.7)'; ctx.font='bold 16px "Segoe UI"';
    ctx.fillText(`🏆 Best: ${highScore}`,W/2,H*0.74);
  }

  const bx=W/2-95, by=H*0.79, bw=190, bh=52;
  const hover=mouse.x>bx&&mouse.x<bx+bw&&mouse.y>by&&mouse.y<by+bh;
  ctx.fillStyle=hover?'#FFD700':'rgba(255,215,0,0.85)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,26); ctx.fill();
  ctx.font='bold 22px "Segoe UI"'; ctx.fillStyle='#1a0800'; ctx.textAlign='center';
  ctx.fillText('▶  PLAY',W/2,by+35);
}

// ── Game over ──
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#FF4040'; ctx.shadowColor='#FF4040'; ctx.shadowBlur=24;
  ctx.font='bold 56px "Segoe UI"';
  ctx.fillText('💀  GAME OVER',W/2,H*0.26);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='bold 38px "Segoe UI"';
  ctx.fillText(`Score: ${score}`,W/2,H*0.39);
  ctx.font='17px "Segoe UI"'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(`Best: ${highScore}   ·   Wave: ${wave}   ·   Kills: ${kills}`,W/2,H*0.47);

  const bx=W/2-105, by=H*0.56, bw=210, bh=52;
  const hover=mouse.x>bx&&mouse.x<bx+bw&&mouse.y>by&&mouse.y<by+bh;
  ctx.fillStyle=hover?'#FFD700':'rgba(255,215,0,0.85)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,26); ctx.fill();
  ctx.font='bold 22px "Segoe UI"'; ctx.fillStyle='#1a0800'; ctx.textAlign='center';
  ctx.fillText('▶  PLAY AGAIN',W/2,by+35);
}

// ── Click handler ──
canvas.addEventListener('click', e=>{
  if(gameState==='menu'){
    const bx=W/2-95,by=H*0.79,bw=190,bh=52;
    if(e.clientX>bx&&e.clientX<bx+bw&&e.clientY>by&&e.clientY<by+bh) startGame();
  }
  if(gameState==='gameover'){
    const bx=W/2-105,by=H*0.56,bw=210,bh=52;
    if(e.clientX>bx&&e.clientX<bx+bw&&e.clientY>by&&e.clientY<by+bh) startGame();
  }
  if(gameState==='upgrade'){
    const cw=200,ch=185,gap=22,total=cw*3+gap*2,sx=(W-total)/2,y=H*0.33;
    upgradeChoices.forEach((u,i)=>{
      const x=sx+i*(cw+gap);
      if(e.clientX>x&&e.clientX<x+cw&&e.clientY>y&&e.clientY<y+ch) applyUpgrade(u);
    });
  }
});

window.addEventListener('keydown', e=>{
  if(gameState==='upgrade'){
    const map={'Digit1':0,'Digit2':1,'Digit3':2,'Numpad1':0,'Numpad2':1,'Numpad3':2};
    if(map[e.code]!==undefined && upgradeChoices[map[e.code]]) applyUpgrade(upgradeChoices[map[e.code]]);
  }
  if(gameState==='menu'&&e.code==='Enter') startGame();
  if(gameState==='gameover'&&e.code==='Enter') startGame();
});

// ── Start game ──
function startGame(){
  player=mkPlayer();
  zombies=[]; spits=[]; burps=[]; poopMines=[]; particles=[]; powerups=[];
  score=0; wave=0; kills=0; shakeF=0; comboCount=0; comboTimer=0;
  gameState='playing';
  stopBgMusic();
  startBgMusic();
  startWave();
}

// ── Main loop ──
function loop(){
  requestAnimationFrame(loop);

  if(gameState==='menu')    { drawMenu(); return; }
  if(gameState==='gameover'){ drawBg(); drawPoops(); drawZombies(); drawParticles(); drawHUD(); drawGameOver(); return; }

  update();

  const sx=shakeF>0?rand(-shakeA,shakeA):0;
  const sy=shakeF>0?rand(-shakeA,shakeA):0;
  ctx.save(); ctx.translate(sx,sy);
  drawBg();
  drawPoops();
  drawBurps();
  drawSpits();
  drawZombies();
  drawPowerups();
  drawParticles();
  drawPlayer();
  drawHUD();
  ctx.restore();

  if(gameState==='upgrade') drawUpgrade();

  // Joystick overlay
  if(joystick.active){
    const maxR=60, kx=joystick.startX+joystick.dx*maxR, ky=joystick.startY+joystick.dy*maxR;
    ctx.save();
    ctx.globalAlpha=0.3; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(joystick.startX,joystick.startY,maxR,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.45; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(kx,ky,26,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

loop();
</script>
